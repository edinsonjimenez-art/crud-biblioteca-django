{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editar Libro</title>

<link rel="stylesheet" href="{% static 'css/estilos.css' %}">

</head>
<body>

<div class="container">

<h1>Editar Libro</h1>

<form method="POST">
{% csrf_token %}

<label>Título</label>
<input type="text" name="titulo" value="{{ libro.titulo }}">

<label>Autor</label>
<input type="text" name="autor" value="{{ libro.autor }}">

<label>Editorial</label>
<input type="text" name="editorial" value="{{ libro.editorial }}">

<label>Año</label>
<input type="number" name="anio" value="{{ libro.anio }}">

<label>Disponible</label>
<input type="checkbox" name="disponible" {% if libro.disponible %}checked{% endif %}>

<button type="submit">Actualizar</button>

</form>

<br>
<a href="{% url 'lista_libros' %}" class="btn">Volver</a>

</div>

</body>
</html>
