<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f6fa;
margin:0;
padding:0;
}

.container{
width:90%;
margin:40px auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.btn{
background:#3498db;
color:white;
padding:8px 12px;
text-decoration:none;
border-radius:5px;
font-size:14px;
}

.btn:hover{
background:#2980b9;
}

.btn-danger{
background:#e74c3c;
}

.btn-danger:hover{
background:#c0392b;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#2c3e50;
color:white;
padding:10px;
}

table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f2f2f2;
}
</style>

</head>
<body>

<div class="container">

<h1>Biblioteca</h1>

<a href="{% url 'crear_libro' %}" class="btn">Nuevo Libro</a>

<table>
<tr>
<th>ID</th>
<th>Título</th>
<th>Autor</th>
<th>Editorial</th>
<th>Año</th>
<th>Disponible</th>
<th>Acciones</th>
</tr>

{% for libro in libros %}
<tr>
<td>{{ libro.id }}</td>
<td>{{ libro.titulo }}</td>
<td>{{ libro.autor }}</td>
<td>{{ libro.editorial }}</td>
<td>{{ libro.anio }}</td>
<td>{{ libro.disponible }}</td>
<td>
<a href="{% url 'editar_libro' libro.id %}" class="btn">Editar</a>
<a href="{% url 'eliminar_libro' libro.id %}" class="btn btn-danger">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
